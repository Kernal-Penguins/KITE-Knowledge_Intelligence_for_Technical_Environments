version: '3.8'

services:
  # 1. Neo4j (Knowledge Graph Database)
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474" # HTTP UI
      - "7687:7687" # Bolt port
    environment:
      - NEO4J_AUTH=neo4j/kite_password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data

  # 2. PostgreSQL (Relational Database for logging and jobs)
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=kite_password
      - POSTGRES_DB=kite
    volumes:
      - pg_data:/var/lib/postgresql/data

  # 3. Qdrant (Vector Database for embeddings)
  qdrant:
    image: qdrant/qdrant:v1.7.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  neo4j_data:
  pg_data:
  qdrant_data:
