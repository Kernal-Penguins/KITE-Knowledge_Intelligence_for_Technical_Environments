version: '3.8'

services:
  # 1. Neo4j (Knowledge Graph Database)
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474" # HTTP UI
      - "7687:7687" # Bolt port
    environment:
      - NEO4J_AUTH=neo4j/kite_password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data

  # 2. PostgreSQL (Relational Database for logging and jobs)
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=kite_password
      - POSTGRES_DB=kite
    volumes:
      - pg_data:/var/lib/postgresql/data

  # 3. Qdrant (Vector Database for embeddings)
  qdrant:
    image: qdrant/qdrant:v1.7.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # 4. Backend (FastAPI + RAG + Agents)
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=kite_password
      - POSTGRES_URL=postgresql+asyncpg://postgres:kite_password@postgres:5432/kite
      - QDRANT_URL=http://qdrant:6333
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - neo4j
      - postgres
      - qdrant

  # 5. Frontend (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  neo4j_data:
  pg_data:
  qdrant_data:
