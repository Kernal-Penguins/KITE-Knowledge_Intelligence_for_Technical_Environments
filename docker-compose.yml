services:
  # 1. Neo4j (Knowledge Graph Database)
  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    ports:
      - "7474:7474" # HTTP UI
      - "7687:7687" # Bolt port
    environment:
      - NEO4J_AUTH=neo4j/kite_password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 5

  # 2. PostgreSQL (Relational Database for logging and jobs)
  postgres:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=kite_password
      - POSTGRES_DB=kite
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Qdrant (Vector Database for embeddings)
  qdrant:
    image: qdrant/qdrant:v1.7.0
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. Backend (FastAPI + RAG + Agents)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - path: ./backend/.env
        required: false
      - path: .env
        required: false
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=kite_password
      - DATABASE_URL=postgresql+asyncpg://postgres:kite_password@postgres:5432/kite
      - QDRANT_URL=http://qdrant:6333
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APP_ENV=production
      - CORS_ORIGINS=http://localhost:5173,http://localhost:80,http://localhost
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5

  # 5. Frontend (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"  # nginx serves on 80 internally, exposed on 5173
    depends_on:
      backend:
        condition: service_healthy

volumes:
  neo4j_data:
  pg_data:
  qdrant_data:
